<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Car</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        :root{
            --thistle:#c4b7cb;
            --pale-slate:#bbc7ce;
            --frozen-water:#bfedef;
            --pearl-aqua:#98e2c6;
            --ebony:#545c52;
        }

        body{
            background-color:var(--frozen-water);
        }

        .card-custom{

            margin-top:40px;

            border:none;

            border-radius:20px;

            box-shadow:0px 2px 10px rgba(0,0,0,0.1);

        }

        .card-header{

            background-color:var(--ebony);

            color:white;

            border-radius:20px 20px 0 0;
        }

        .save-btn{

            background-color:var(--pearl-aqua);

            border:none;
        }

        .save-btn:hover{

            background-color:var(--thistle);
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card card-custom">

        <div class="card-header">

            <h2>Add / Edit Car</h2>

        </div>


        <div class="card-body">

            <form
                    method="post"
                    th:action="@{/save}"
                    enctype="multipart/form-data">

                <input
                        type="hidden"
                        name="id"
                        th:value="${car.id}"
                >


                <div class="mb-3">

                    <label>Model</label>

                    <input
                            type="text"
                            class="form-control"
                            name="model"
                            th:value="${car.model}"
                    >

                </div>


                <div class="mb-3">

                    <label>Price Per Day</label>

                    <input
                            type="number"
                            class="form-control"
                            name="pricePerDay"
                            th:value="${car.pricePerDay}"
                    >

                </div>


                <div class="mb-3">

                    <label>Available</label>

                    <select class="form-control" name="available">

                        <option value="true" th:selected="${car.available == true}">
                            Yes
                        </option>

                        <option value="false" th:selected="${car.available == false}">
                            No
                        </option>

                    </select>

                        <option value="true">
                            Yes
                        </option>

                        <option value="false">
                            No
                        </option>

                    </select>

                </div>



                <div class="mb-3">

                    <label>Brand</label>

                    <select class="form-control" name="brand">

                        <option th:each="b:${brands}"
                                th:value="${b.id}"
                                th:text="${b.name}"
                                th:selected="${car.brand != null and b.id == car.brand.id}">
                        </option>

                    </select>

                </div>



                <div class="mb-3">

                    <label>Options</label>

                    <select multiple class="form-control" name="optionIds">

                        <option th:each="o:${options}"
                                th:value="${o.id}"
                                th:text="${o.name}"
                                th:selected="${car.options != null and car.options.contains(o)}">
                        </option>

                    </select>

                </div>



                <div class="mb-3">

                    <label>Car Image</label>

                    <input type="file"
                           class="form-control"
                           name="file">

                </div>


                <br>

                <button
                        type="submit"
                        class="btn save-btn">

                    Save

                </button>


                <a
                        th:href="@{/home}"
                        class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
